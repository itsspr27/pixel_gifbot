<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ربات به‌زودی</title>
  <!-- فونت وزیر از CDN -->
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" type="text/css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0d15;
      font-family: 'Vazir', sans-serif;
      padding: 1rem;
      /* زمینه موج‌دار انیمیشنی تیره */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 255, 200, 0.03) 0%, transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(100, 0, 255, 0.05) 0%, transparent 30%),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, 
                                  rgba(0, 0, 0, 0.2) 2px, rgba(0, 0, 0, 0.2) 6px);
      background-blend-mode: overlay;
      position: relative;
      overflow: hidden;
    }

    /* لایه‌های موج‌دار متحرک (پس‌زمینه انیمیشنی) */
    .wave-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .wave {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 40%, rgba(0, 180, 255, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 70% 60%, rgba(200, 0, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 40% 80%, rgba(0, 255, 200, 0.05) 0%, transparent 45%);
      background-blend-mode: screen;
      border-radius: 40% 60% 70% 30% / 50% 60% 40% 50%;
      filter: blur(40px);
      animation: waveMove 20s infinite alternate ease-in-out;
      transform-origin: center;
      opacity: 0.8;
    }

    .wave:nth-child(2) {
      background: radial-gradient(circle at 60% 30%, rgba(255, 100, 0, 0.06) 0%, transparent 45%),
                  radial-gradient(circle at 20% 70%, rgba(0, 200, 255, 0.07) 0%, transparent 50%);
      animation-duration: 25s;
      animation-delay: -3s;
      border-radius: 30% 70% 50% 60% / 40% 50% 60% 70%;
      filter: blur(60px);
      opacity: 0.6;
    }

    .wave:nth-child(3) {
      background: radial-gradient(circle at 80% 20%, rgba(150, 0, 255, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 10% 90%, rgba(0, 255, 150, 0.04) 0%, transparent 50%);
      animation-duration: 30s;
      animation-delay: -8s;
      border-radius: 60% 30% 40% 70% / 60% 40% 70% 30%;
      filter: blur(80px);
      opacity: 0.5;
    }

    @keyframes waveMove {
      0% {
        transform: translate(0%, 0%) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(5%, -5%) scale(1.1) rotate(3deg);
      }
      50% {
        transform: translate(-5%, 8%) scale(0.9) rotate(-2deg);
      }
      75% {
        transform: translate(8%, -3%) scale(1.05) rotate(5deg);
      }
      100% {
        transform: translate(-3%, 3%) scale(1.15) rotate(-4deg);
      }
    }

    /* کادر محتوای اصلی */
    .card {
      position: relative;
      z-index: 10;
      max-width: 720px;
      width: 100%;
      padding: 2.5rem 2rem;
      background: rgba(8, 12, 20, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      text-align: center;
      transition: all 0.3s ease;
    }

    /* متن اصلی با حرکت نرم */
    .animated-text {
      font-size: 1.9rem;
      line-height: 3rem;
      font-weight: 500;
      color: #eef5ff;
      text-shadow: 0 0 15px rgba(0, 180, 255, 0.3), 0 0 40px rgba(100, 0, 255, 0.2);
      animation: textFloat 4s infinite alternate ease-in-out;
      letter-spacing: 0.5px;
      word-break: break-word;
    }

    /* حرکت متن: جابه‌جایی و درخشش ملایم */
    @keyframes textFloat {
      0% {
        transform: translateY(0px) scale(1);
        text-shadow: 0 0 15px rgba(0, 180, 255, 0.3), 0 0 40px rgba(100, 0, 255, 0.2);
      }
      50% {
        transform: translateY(-6px) scale(1.01);
        text-shadow: 0 0 25px rgba(0, 220, 255, 0.5), 0 0 60px rgba(150, 0, 255, 0.3);
      }
      100% {
        transform: translateY(4px) scale(0.99);
        text-shadow: 0 0 20px rgba(0, 200, 255, 0.4), 0 0 50px rgba(200, 0, 255, 0.25);
      }
    }

    /* زیرنویس یا المان تزیینی (اختیاری) */
    .sub-note {
      margin-top: 1.8rem;
      font-size: 0.9rem;
      color: rgba(200, 215, 240, 0.4);
      letter-spacing: 1px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 1.2rem;
      font-weight: 300;
    }

    /* ریسپانسیو */
    @media (max-width: 480px) {
      .animated-text {
        font-size: 1.4rem;
        line-height: 2.4rem;
      }
      .card {
        padding: 1.8rem 1.2rem;
        border-radius: 2rem;
      }
    }

    /* جلوگیری از overflow در موبایل */
    .wave-bg {
      will-change: transform;
    }
  </style>
</head>
<body>
  <!-- لایه‌های موج‌دار انیمیشنی -->
  <div class="wave-bg">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
  </div>

  <!-- کارت محتوا -->
  <div class="card">
    <div class="animated-text">
      بزودی ربات را منتشر میکنیم<br>
      سایت به دلیل سودجویی بعضی‌ها بسته است
    </div>
    <!-- یک خط تزیینی کوچک (اختیاری) -->
    <div class="sub-note">⏳ منتظر باشید ...</div>
  </div>
</body>
</html>
