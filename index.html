<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیکسل گیف بات - گیف خودتو بساز !</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.6/fix-webm-duration.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&family=Tanha:wght@400;700&family=Shabnam:wght@400;700&display=swap');
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: #e0f2fe;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }
        .container { max-width: 920px; margin: auto; background: rgba(15,23,42,0.97); padding: 25px; border-radius: 20px; }
        h1 { text-align: center; color: #67e8f9; }
        label { display: block; margin: 15px 0 8px; font-weight: bold; color: #bae6fd; }
        input[type="file"] { width: 100%; padding: 14px; background: #1e2937; border: 2px dashed #67e8f9; border-radius: 12px; }
        textarea { width: 100%; padding: 14px; background: #1e2937; border: 2px dashed #67e8f9; border-radius: 12px; color: #e0f2fe; font-family: 'Vazirmatn', sans-serif; font-size: 16px; resize: vertical; min-height: 60px; }
        button { padding: 12px 20px; margin: 5px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .generate-btn { width: 100%; padding: 18px; font-size: 18px; background: #f43f5e; color: white; border: none; }
        video { max-width: 100%; border-radius: 12px; margin: 15px 0; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .btn-group button { flex: 1 0 auto; background: #334155; color: #e0f2fe; border: 2px solid transparent; transition: 0.2s; }
        .btn-group button.active { border-color: #67e8f9; background: #1e2937; color: #67e8f9; }
        .btn-group button.wide-active { border-color: #f59e0b; background: #1e2937; color: #f59e0b; }
        #progress { background: #1e2937; padding: 20px; border-radius: 16px; }
        #percent { font-size: 1.4rem; color: #67e8f9; }
        .download-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .download-btn { padding: 14px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .download-webm { background: #34d399; color: #0f172a; }
        .download-btn:hover { opacity: 0.8; }
        .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 پیکسل گیف بات - گیف خودتو بساز !</h1>
        
        <label>1. انتخاب ویدیو</label>
        <input type="file" id="videoInput" accept="video/*">
        
        <label>2. متن اصلی (برای خط جدید Enter بزنید)</label>
        <textarea id="mainText" placeholder="متن خود را وارد کنید"></textarea>
        
        <label>3. موقعیت متن</label>
        <div class="btn-group" id="posGroup">
            <button onclick="setPos('top', this)">بالا</button>
            <button onclick="setPos('center', this)" class="active">وسط</button>
            <button onclick="setPos('bottom', this)">پایین</button>
        </div>
        
        <label>4. حالت Wide</label>
        <div class="btn-group" id="wideGroup">
            <button onclick="toggleWide(this)" class="">📐 Wide (۵۰%)</button>
        </div>
        
        <button onclick="startProcessing()" id="generateBtn" disabled class="generate-btn">🚀 ساخت ویدیو</button>
        
        <div id="progress" style="display:none; text-align:center; margin:25px 0;">
            <p>در حال پردازش... <span id="percent">0%</span></p>
        </div>
        
        <div id="output" style="display:none; text-align:center;">
            <h3>✅ ویدیو آماده شد</h3>
            <video id="outputVideo" controls></video><br><br>
            <div class="download-buttons">
                <button onclick="downloadOutput()" id="downloadBtn" class="download-btn download-webm">⬇️ دانلود</button>
            </div>
        </div>
    </div>

    <script>
        let currentPos = 'center';
        let outputBlob = null;
        let processing = false;
        let wideMode = false;
        let recordedDuration = 0;
        let recordingStartTime = 0;

        function setPos(pos, btn) {
            currentPos = pos;
            document.querySelectorAll('#posGroup button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleWide(btn) {
            wideMode = !wideMode;
            btn.classList.toggle('wide-active');
            btn.textContent = wideMode ? '📐 Wide (فعال)' : '📐 Wide (۵۰%)';
        }

        document.getElementById('videoInput').addEventListener('change', () => {
            document.getElementById('generateBtn').disabled = false;
        });

        async function startProcessing() {
            if (processing) return;
            
            const file = document.getElementById('videoInput').files[0];
            const text = document.getElementById('mainText').value;
            if (!file) {
                alert('لطفاً یک ویدیو انتخاب کنید');
                return;
            }

            processing = true;
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('progress').style.display = 'block';
            document.getElementById('output').style.display = 'none';
            document.getElementById('percent').textContent = '0%';
            document.getElementById('downloadBtn').disabled = true;

            let video = null;
            let canvas = null;
            let stream = null;
            let recorder = null;
            let animationId = null;
            let safetyTimeout = null;
            let stopRequested = false;
            let chunks = [];
            let stopped = false;
            let startTime = 0;

            const safeStopRecorder = () => {
                if (stopped) return;
                stopped = true;
                
                if (animationId) {
                    try { cancelAnimationFrame(animationId); } catch(e) {}
                    animationId = null;
                }
                
                if (safetyTimeout) {
                    try { clearTimeout(safetyTimeout); } catch(e) {}
                    safetyTimeout = null;
                }
                
                if (recorder && recorder.state === 'recording') {
                    try {
                        console.log('Stopping recorder...');
                        recorder.stop();
                    } catch(e) {
                        console.warn('Recorder stop error:', e);
                    }
                }
                
                if (stream) {
                    try { stream.getTracks().forEach(t => t.stop()); } catch(e) {}
                }
                
                if (video && video.parentNode) {
                    try { document.body.removeChild(video); } catch(e) {}
                }
            };

            try {
                console.log('شروع پردازش...');
                
                video = document.createElement('video');
                video.muted = true;
                video.playsInline = true;
                video.preload = 'auto';
                video.style.display = 'none';
                document.body.appendChild(video);

                const videoUrl = URL.createObjectURL(file);
                video.src = videoUrl;
                
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => {
                        reject(new Error('Timeout: ویدیو بارگذاری نشد'));
                    }, 20000);
                    
                    video.onloadedmetadata = () => {
                        clearTimeout(timeout);
                        console.log('Video loaded:', video.videoWidth, 'x', video.videoHeight);
                        resolve();
                    };
                    
                    video.onerror = (e) => {
                        clearTimeout(timeout);
                        reject(new Error('Video load error'));
                    };
                });

                if (!video.videoWidth || !video.videoHeight || video.videoWidth <= 0 || video.videoHeight <= 0) {
                    throw new Error('Invalid video dimensions');
                }

                if (!video.duration || video.duration <= 0 || !isFinite(video.duration)) {
                    throw new Error('Invalid video duration');
                }

                recordedDuration = video.duration;

                video.currentTime = 0;
                await new Promise(resolve => {
                    video.onseeked = () => resolve();
                    setTimeout(() => resolve(), 2000);
                });

                // Setup canvas
                canvas = document.createElement('canvas');
                let canvasWidth = wideMode ? Math.round(video.videoWidth * 1.5) : video.videoWidth;
                let canvasHeight = video.videoHeight;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                const ctx = canvas.getContext('2d');

                // Setup stream and recorder
                stream = canvas.captureStream(30);
                recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8',
                    videoBitsPerSecond: 2500000
                });
                chunks = [];

                recorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) {
                        chunks.push(e.data);
                        console.log('Chunk received:', e.data.size);
                    }
                };

                recorder.onstop = async () => {
                    if (stopRequested) return;
                    stopRequested = true;
                    
                    console.log('Recorder stopped, chunks:', chunks.length);
                    
                    if (chunks.length > 0) {
                        try {
                            const rawBlob = new Blob(chunks, { type: 'video/webm' });
                            console.log('Raw blob size:', rawBlob.size);
                            
                            // ===== اصلاح متادیتای Duration با کتابخانه fix-webm-duration =====
                            let finalBlob = rawBlob;
                            const durationMs = recordedDuration * 1000;
                            
                            if (typeof window.ysFixWebmDuration === 'function') {
                                try {
                                    console.log('Fixing WebM duration with library...');
                                    // استفاده از Promise-style
                                    finalBlob = await window.ysFixWebmDuration(rawBlob, durationMs, { logger: false });
                                    console.log('Duration fixed successfully');
                                } catch (fixError) {
                                    console.warn('Library fix failed, using raw blob:', fixError);
                                    finalBlob = rawBlob;
                                }
                            } else {
                                console.warn('ysFixWebmDuration not available, using raw blob');
                                // تلاش با روش دستی
                                try {
                                    finalBlob = await fixWebmDurationManually(rawBlob, durationMs);
                                } catch (e) {
                                    console.warn('Manual fix failed:', e);
                                    finalBlob = rawBlob;
                                }
                            }
                            // ==============================================================
                            
                            outputBlob = finalBlob;
                            
                            // نمایش ویدیو
                            const url = URL.createObjectURL(finalBlob);
                            document.getElementById('outputVideo').src = url;
                            document.getElementById('output').style.display = 'block';
                            document.getElementById('progress').style.display = 'none';
                            document.getElementById('generateBtn').disabled = false;
                            document.getElementById('downloadBtn').disabled = false;
                            console.log('✅ Recording finished, size:', (finalBlob.size / 1024 / 1024).toFixed(2), 'MB');
                            
                            // تست Duration
                            const testVideo = document.createElement('video');
                            testVideo.src = url;
                            testVideo.onloadedmetadata = () => {
                                console.log('✅ Final video duration:', testVideo.duration, 'seconds');
                            };
                            
                        } catch(e) {
                            console.error('Error creating blob:', e);
                            alert('خطا در ساخت فایل خروجی: ' + e.message);
                            document.getElementById('generateBtn').disabled = false;
                            document.getElementById('progress').style.display = 'none';
                            document.getElementById('downloadBtn').disabled = false;
                        }
                    } else {
                        alert('خطا: ویدیو خروجی خالی است');
                        document.getElementById('generateBtn').disabled = false;
                        document.getElementById('progress').style.display = 'none';
                        document.getElementById('downloadBtn').disabled = false;
                    }
                    
                    safeStopRecorder();
                    processing = false;
                };

                // شروع ضبط با timeslice 100ms
                recorder.start(100);
                recordingStartTime = Date.now();

                // Start playing
                try {
                    await video.play();
                    console.log('Video playing');
                } catch (e) {
                    video.muted = true;
                    await video.play();
                    console.log('Video playing (muted)');
                }

                const duration = video.duration;
                console.log('Processing duration:', duration, 'seconds');

                const fontFamily = 'Vazirmatn';
                let elapsedTime = 0;
                let frameCount = 0;
                startTime = performance.now();

                const drawFrame = () => {
                    if (stopRequested || stopped) return;

                    try {
                        const currentTime = performance.now();
                        elapsedTime = (currentTime - startTime) / 1000;

                        const currentTimeVideo = video.currentTime || 0;
                        const isEnded = video.ended || (currentTimeVideo >= duration - 0.05);
                        
                        if (isEnded) {
                            console.log('Video ended at:', currentTimeVideo);
                            if (recorder && recorder.state === 'recording') {
                                safeStopRecorder();
                            }
                            return;
                        }

                        if (elapsedTime >= duration + 1) {
                            console.log('Elapsed time exceeded duration');
                            if (recorder && recorder.state === 'recording') {
                                safeStopRecorder();
                            }
                            return;
                        }

                        // Draw video frame
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        const percent = Math.min(Math.round((elapsedTime / duration) * 100), 100);
                        document.getElementById('percent').textContent = percent + '%';

                        // Draw text
                        if (text) {
                            const lines = text.split('\n').filter(line => line.trim() !== '');
                            if (lines.length > 0) {
                                let baseSize = Math.min(canvas.width, canvas.height) / 8;
                                const aspectRatio = canvas.width / canvas.height;
                                if (aspectRatio > 1.8) {
                                    baseSize = canvas.height / (4.2 + (lines.length - 1) * 0.8);
                                } else if (aspectRatio < 1.1) {
                                    baseSize = canvas.width / (5.5 + (lines.length - 1) * 0.6);
                                } else {
                                    baseSize = Math.min(canvas.width, canvas.height) / (6.5 + (lines.length - 1) * 0.5);
                                }
                                
                                let fontSize = Math.max(16, baseSize);
                                ctx.font = `bold ${fontSize}px ${fontFamily}`;
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'bottom';
                                
                                let maxLineWidth = 0;
                                lines.forEach(line => {
                                    const metrics = ctx.measureText(line);
                                    if (metrics.width > maxLineWidth) maxLineWidth = metrics.width;
                                });
                                
                                let maxWidth = canvas.width * 0.92;
                                let minFontSize = 12;
                                
                                while (maxLineWidth > maxWidth && fontSize > minFontSize) {
                                    fontSize -= 1.5;
                                    ctx.font = `bold ${fontSize}px ${fontFamily}`;
                                    maxLineWidth = 0;
                                    lines.forEach(line => {
                                        const metrics = ctx.measureText(line);
                                        if (metrics.width > maxLineWidth) maxLineWidth = metrics.width;
                                    });
                                }
                                
                                if (maxLineWidth > maxWidth) {
                                    fontSize = fontSize * (maxWidth / maxLineWidth) * 0.95;
                                    ctx.font = `bold ${fontSize}px ${fontFamily}`;
                                }

                                const lineHeight = fontSize * 1.4;
                                const totalHeight = lines.length * lineHeight;
                                
                                let startY = canvas.height / 2 + fontSize/3;
                                const padding = fontSize * 0.5;
                                
                                if (currentPos === 'top') {
                                    startY = padding + fontSize/2;
                                } else if (currentPos === 'bottom') {
                                    startY = canvas.height - padding/2;
                                }
                                
                                if (currentPos === 'center' || currentPos === 'top') {
                                    startY = startY - totalHeight/2 + lineHeight/2;
                                } else {
                                    startY = startY - totalHeight + lineHeight;
                                }

                                lines.forEach((line, index) => {
                                    const y = startY + index * lineHeight;
                                    
                                    ctx.strokeStyle = 'black';
                                    ctx.lineWidth = Math.max(6, fontSize / 5);
                                    ctx.strokeText(line, canvas.width/2, y);
                                    
                                    ctx.lineWidth = Math.max(3, fontSize / 8);
                                    ctx.strokeText(line, canvas.width/2, y);
                                    
                                    ctx.fillStyle = 'white';
                                    ctx.fillText(line, canvas.width/2, y);
                                });
                            }
                        }

                        // ===== واترمارک با دور سیاه و 40% کمرنگ =====
                        ctx.save();
                        const wmText = '@pixelgifbot';
                        let wmSize = Math.max(14, Math.min(canvas.width, canvas.height) / 38);
                        
                        ctx.font = `bold ${wmSize}px 'Ubuntu', sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        const leftMargin = canvas.width * 0.01;
                        const centerY = canvas.height / 2;
                        
                        ctx.translate(leftMargin + wmSize * 0.3, centerY);
                        ctx.rotate(-Math.PI / 2);
                        
                        ctx.globalAlpha = 0.4;
                        ctx.strokeStyle = '#000000';
                        ctx.lineWidth = Math.max(4, wmSize / 4);
                        ctx.strokeText(wmText, 0, 0);
                        ctx.fillStyle = '#ffffff';
                        ctx.fillText(wmText, 0, 0);
                        
                        ctx.restore();
                        // ========================================

                        frameCount++;
                        animationId = requestAnimationFrame(drawFrame);

                    } catch (err) {
                        console.error('DrawFrame error:', err);
                        if (!stopRequested && !stopped) {
                            safeStopRecorder();
                        }
                    }
                };

                safetyTimeout = setTimeout(() => {
                    if (!stopRequested && !stopped) {
                        console.log('Safety timeout triggered');
                        safeStopRecorder();
                    }
                }, (duration * 1000) + 10000);

                animationId = requestAnimationFrame(drawFrame);

            } catch (error) {
                console.error('Processing error:', error);
                const errorMsg = error.message || 'خطای ناشناخته';
                
                let userMessage = errorMsg;
                if (errorMsg.includes('Video load error')) {
                    userMessage = 'ویدیو قابل بارگذاری نیست. لطفاً از فرمت MP4 یا WebM استفاده کنید.';
                } else if (errorMsg.includes('Timeout')) {
                    userMessage = 'زمان بارگذاری ویدیو به پایان رسید. لطفاً فایل کوچک‌تری انتخاب کنید.';
                } else if (errorMsg.includes('duration')) {
                    userMessage = 'مدت زمان ویدیو نامعتبر است.';
                }
                
                alert('خطا در پردازش ویدیو: ' + userMessage);
                safeStopRecorder();
                processing = false;
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('progress').style.display = 'none';
                document.getElementById('downloadBtn').disabled = false;
            }
        }

        // تابع دستی برای اصلاح WebM (در صورت عدم دسترسی به کتابخانه)
        function fixWebmDurationManually(blob, durationMs) {
            return new Promise((resolve) => {
                try {
                    const reader = new FileReader();
                    reader.onload = function() {
                        try {
                            const buffer = reader.result;
                            const view = new DataView(buffer);
                            
                            const durationMarker = 0x4489;
                            let durationOffset = -1;
                            let durationLength = 0;
                            
                            const clusterMarker = 0x1F43B675;
                            let clusterOffset = -1;
                            
                            for (let i = 0; i < buffer.byteLength - 4; i++) {
                                if (view.getUint16(i) === durationMarker) {
                                    durationOffset = i;
                                    durationLength = view.getUint8(i + 2);
                                    break;
                                }
                            }
                            
                            for (let i = 0; i < buffer.byteLength - 4; i++) {
                                if (view.getUint32(i) === clusterMarker) {
                                    clusterOffset = i;
                                    break;
                                }
                            }
                            
                            const durationValue = durationMs / 1000;
                            const floatBuffer = new ArrayBuffer(8);
                            new DataView(floatBuffer).setFloat64(0, durationValue);
                            const floatBytes = new Uint8Array(floatBuffer);
                            
                            let resultBuffer;
                            
                            if (durationOffset !== -1) {
                                resultBuffer = new Uint8Array(buffer);
                                for (let i = 0; i < 8 && i < durationLength; i++) {
                                    resultBuffer[durationOffset + 3 + i] = floatBytes[i];
                                }
                            } else if (clusterOffset > 0) {
                                const newSize = buffer.byteLength + 12;
                                resultBuffer = new Uint8Array(newSize);
                                resultBuffer.set(new Uint8Array(buffer), 0);
                                
                                const pos = clusterOffset;
                                resultBuffer[pos - 2] = 0x44;
                                resultBuffer[pos - 1] = 0x89;
                                resultBuffer[pos] = 8;
                                for (let i = 0; i < 8; i++) {
                                    resultBuffer[pos + 1 + i] = floatBytes[i];
                                }
                            } else {
                                resolve(blob);
                                return;
                            }
                            
                            resolve(new Blob([resultBuffer], { type: 'video/webm' }));
                        } catch (e) {
                            console.warn('Manual fix failed:', e);
                            resolve(blob);
                        }
                    };
                    reader.readAsArrayBuffer(blob);
                } catch (e) {
                    console.warn('Manual fix failed:', e);
                    resolve(blob);
                }
            });
        }

        function downloadOutput() {
    console.log("=== DOWNLOAD FUNCTION STARTED ===");
    
    // Step 1: Verify outputBlob exists
    console.log("Step 1: Checking outputBlob...");
    if (!outputBlob) {
        console.error("❌ Step 1 FAILED: outputBlob is null or undefined");
        alert('ویدیویی برای دانلود وجود ندارد');
        return;
    }
    console.log("✅ Step 1 PASSED: outputBlob exists");
    
    // Step 2: Verify outputBlob properties
    console.log("Step 2: Checking outputBlob properties...");
    console.log(`  - outputBlob.size: ${outputBlob.size} bytes (${(outputBlob.size / 1024 / 1024).toFixed(2)} MB)`);
    console.log(`  - outputBlob.type: "${outputBlob.type}"`);
    console.log(`  - outputBlob.constructor: ${outputBlob.constructor.name}`);
    
    if (outputBlob.size === 0) {
        console.error("❌ Step 2 FAILED: outputBlob.size is 0");
        alert('فایل خروجی خالی است');
        return;
    }
    if (!outputBlob.type || !outputBlob.type.includes('webm')) {
        console.warn("⚠️ Step 2 WARNING: outputBlob.type is not 'video/webm'");
    } else {
        console.log("✅ Step 2 PASSED: outputBlob has valid properties");
    }
    
    // Step 3: Detect environment
    console.log("Step 3: Detecting environment...");
    const hasTelegram = !!(window.Telegram && window.Telegram.WebApp);
    const hasTelegramWebApp = hasTelegram && typeof window.Telegram.WebApp === 'object';
    const hasOpenLink = hasTelegramWebApp && typeof window.Telegram.WebApp.openLink === 'function';
    const urlHasTgWebApp = window.location.href.includes('tgWebApp');
    const userAgent = window.navigator.userAgent || '';
    const isTelegramUA = userAgent.includes('Telegram');
    const isInsideTelegram = hasTelegramWebApp || urlHasTgWebApp || isTelegramUA;
    
    console.log(`  - window.Telegram exists: ${!!window.Telegram}`);
    console.log(`  - window.Telegram.WebApp exists: ${hasTelegramWebApp}`);
    console.log(`  - Telegram.WebApp.openLink exists: ${hasOpenLink}`);
    console.log(`  - URL includes 'tgWebApp': ${urlHasTgWebApp}`);
    console.log(`  - UserAgent includes 'Telegram': ${isTelegramUA}`);
    console.log(`  - Is inside Telegram: ${isInsideTelegram}`);
    
    // Step 4: Check document.body
    console.log("Step 4: Checking document.body...");
    if (!document.body) {
        console.error("❌ Step 4 FAILED: document.body does not exist");
        alert('مشکل در ساختار صفحه');
        return;
    }
    console.log("✅ Step 4 PASSED: document.body exists");
    
    // Step 5: Try to create Blob URL
    console.log("Step 5: Creating Blob URL...");
    let blobUrl = null;
    try {
        blobUrl = URL.createObjectURL(outputBlob);
        console.log(`  - Blob URL created: ${blobUrl.substring(0, 50)}...`);
        console.log(`  - Blob URL length: ${blobUrl.length}`);
        console.log("✅ Step 5 PASSED: Blob URL created successfully");
    } catch (e) {
        console.error("❌ Step 5 FAILED: URL.createObjectURL threw error:", e);
        console.error(`  - Error name: ${e.name}`);
        console.error(`  - Error message: ${e.message}`);
        alert('خطا در ساخت لینک دانلود: ' + e.message);
        return;
    }
    
    // If not in Telegram, use simple download
    if (!isInsideTelegram) {
        console.log("ℹ️ Not in Telegram, using standard browser download...");
        try {
            const a = document.createElement('a');
            a.href = blobUrl;

    // === TELEGRAM WEB APP DOWNLOAD METHODS ===

    const methods = [
        { 
            name: 'Method 1: Blob + anchor (injected)',
            fn: method1_BlobAnchor,
            description: 'Standard anchor download with Blob URL'
        },
        { 
            name: 'Method 2: File object',
            fn: method2_FileObject,
            description: 'Convert to File object then download'
        },
        { 
            name: 'Method 3: navigator.share()',
            fn: method3_NavigatorShare,
            description: 'Use Web Share API'
        },
        { 
            name: 'Method 4: window.open(blobURL)',
            fn: method4_WindowOpen,
            description: 'Open blob URL in new tab'
        },
        { 
            name: 'Method 5: location.href',
            fn: method5_LocationHref,
            description: 'Navigate to blob URL directly'
        },
        { 
            name: 'Method 6: Telegram.WebApp.openLink()',
            fn: method6_TelegramOpenLink,
            description: 'Telegram\'s openLink API'
        },
        { 
            name: 'Method 7: Data URL',
            fn: method7_DataURL,
            description: 'Convert blob to Data URL'
        },
        { 
            name: 'Method 8: Invisible iframe',
            fn: method8_Iframe,
            description: 'Use hidden iframe to trigger download'
        },
        { 
            name: 'Method 9: File System Access API',
            fn: method9_FileSystemAccess,
            description: 'Modern File System Access API'
        }
    ];
    
    let currentMethodIndex = 0;
    let downloadSuccessful = false;
    let failures = [];
    
    function tryNextMethod() {
        if (currentMethodIndex >= methods.length || downloadSuccessful) {
            if (!downloadSuccessful) {
                console.error("❌ ALL METHODS FAILED!");
                console.error("Failure summary:");
                failures.forEach((f, i) => {
                    console.error(`  ${i+1}. ${f}`);
                });
                showFinalError();
            }
            return;
        }
        
        const method = methods[currentMethodIndex];
        console.log(`\n🔄 ${method.name} - ${method.description}`);
        console.log(`  Attempt ${currentMethodIndex + 1} of ${methods.length}`);
        
        try {
            const result = method.fn();
            
            if (result instanceof Promise) {
                result
                    .then((success) => {
                        if (success) {
                            console.log(`✅ ${method.name} SUCCEEDED!`);
                            downloadSuccessful = true;
                        } else {
                            console.warn(`❌ ${method.name} FAILED (returned false)`);
                            failures.push(`${method.name}: Returned false`);
                            currentMethodIndex++;
                            setTimeout(tryNextMethod, 300);
                        }
                    })
                    .catch((err) => {
                        console.error(`❌ ${method.name} FAILED with error:`, err);
                        failures.push(`${method.name}: ${err.message || 'Unknown error'}`);
                        currentMethodIndex++;
                        setTimeout(tryNextMethod, 300);
                    });
            } else if (result === true) {
                console.log(`✅ ${method.name} SUCCEEDED!`);
                downloadSuccessful = true;
            } else if (result === false) {
                console.warn(`❌ ${method.name} FAILED (returned false)`);
                failures.push(`${method.name}: Returned false`);
                currentMethodIndex++;
                setTimeout(tryNextMethod, 300);
            } else {
                console.warn(`⚠️ ${method.name} returned unknown result:`, result);
                failures.push(`${method.name}: Returned ${typeof result}`);
                currentMethodIndex++;
                setTimeout(tryNextMethod, 300);
            }
        } catch (e) {
            console.error(`❌ ${method.name} THREW ERROR:`, e);
            failures.push(`${method.name}: ${e.name} - ${e.message}`);
            currentMethodIndex++;
            setTimeout(tryNextMethod, 300);
        }
    }
    
    // === METHOD IMPLEMENTATIONS ===

    function method3_NavigatorShare() {
        console.log("  Checking navigator.share...");
        if (!navigator.share) {
            console.warn("  ❌ navigator.share is not available");
            return false;
        }
        console.log("  ✅ navigator.share is available");
        
        if (navigator.canShare) {
            console.log("  Checking if file can be shared...");
            try {
                const file = new File([outputBlob], 'video-with-text.webm', { 
                    type: outputBlob.type || 'video/webm' 
                });
                const shareData = {
                    title: 'ویدیو با متن',
                    files: [file]
                };
                const canShare = navigator.canShare(shareData);
                console.log(`  - navigator.canShare() returned: ${canShare}`);
                if (!canShare) {
                    console.warn("  ⚠️ navigator.canShare says file cannot be shared");
                    // Continue anyway, canShare might be wrong
                }
            } catch (e) {
                console.warn("  - navigator.canShare check failed:", e);
            }
        }
        
        console.log("  Attempting navigator.share()...");
        try {
            const file = new File([outputBlob], 'video-with-text.webm', { 
                type: outputBlob.type || 'video/webm' 
            });
            console.log(`  - File created for sharing: ${file.name} (${file.size} bytes)`);
            
            return navigator.share({
                title: 'ویدیو با متن',
                files: [file]
            })
            .then(() => {
                console.log("  ✅ navigator.share() succeeded");
                return true;
            })
            .catch((err) => {
                console.warn("  ❌ navigator.share() failed:", err);
                console.warn(`  - Error: ${err.name} - ${err.message}`);
                if (err.name === 'AbortError') {
                    console.log("  - User cancelled share");
                }
                return false;
            });
        } catch (e) {
            console.error("  ❌ navigator.share() threw error:", e);
            return false;
        }
    }
    
    function method4_WindowOpen() {
        console.log("  Attempting window.open...");
        try {

            console.log(`  - Blob URL: ${url.substring(0, 50)}...`);
            
            const win = window.open(url, '_blank');

                setTimeout(() => {
                    URL.revokeObjectURL(url);
                    console.log("  - Blob URL revoked");
                    try {
                        if (win.closed) {

                        } else {
                            console.log("  - Window is still open");

                        console.log("  - Could not check window status");
                    }
                }, 1500);
                return true;
            } else {
                console.warn("  - window.open returned null (popup blocked?)");
                URL.revokeObjectURL(url);
                return false;
            }

            console.error("  ❌ window.open error:", e);
            return false;
        }
    }
    
    function method5_LocationHref() {

    function method7_DataURL() {
        console.log("  Attempting Data URL conversion...");
        console.log(`  - outputBlob.size: ${outputBlob.size} bytes`);
        console.log("  - Reading blob as Data URL...");
        
        try {
            const reader = new FileReader();
            console.log("  - FileReader created");
            
            return new Promise((resolve) => {
                reader.onload = function(e) {
                    try {
                        console.log("  - FileReader loaded");
                        const dataUrl = e.target.result;
                        console.log(`  - Data URL length: ${dataUrl.length}`);
                        console.log(`  - Data URL type: ${dataUrl.substring(0, 50)}...`);
                        
                        const a = document.createElement('a');
                        a.href = dataUrl;
                        a.download = 'video-with-text.webm';
                        console.log("  - Anchor created with Data URL");
                        
                        document.body.appendChild(a);
                        console.log("  - Anchor appended");
                        
                        a.click();
                        console.log("  - a.click() executed");
                        
                        setTimeout(() => {
                            document.body.removeChild(a);
                            console.log("  - Anchor removed");
                            resolve(true);
                        }, 1000);
                    } catch (err) {
                        console.error("  ❌ Data URL download error:", err);
                        resolve(false);
                    }
                };
                
                reader.onerror = function(e) {
                    console.error("  ❌ FileReader error:", e);
                    console.error(`  - Error: ${e.target.error}`);
                    resolve(false);
                };
                
                reader.readAsDataURL(outputBlob);
                console.log("  - readAsDataURL started");
            });
        } catch (e) {
            console.error("  ❌ Data URL method error:", e);
            return false;
        }
    }

        try {
            const url = URL.createObjectURL(outputBlob);

            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            console.log("  - Iframe created with blob URL");
            
            document.body.appendChild(iframe);
            console.log("  - Iframe appended to body");
            
            setTimeout(() => {
                document.body.removeChild(iframe);
                console.log("  - Iframe removed");
                URL.revokeObjectURL(url);
                console.log("  - Blob URL revoked");
                
                // Try to trigger download from iframe
                try {
                    console.log("  - Attempting to trigger download from iframe...");
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc) {
                        console.log("  - iframe document accessible");
                        const a = doc.createElement('a');
                        a.href = url;
                        a.download = 'video-with-text.webm';
                        doc.body.appendChild(a);
                        a.click();
                        console.log("  - Download triggered from iframe");
                        setTimeout(() => {
                            doc.body.removeChild(a);

                        }, 500);
                    } else {
                        console.warn("  - Could not access iframe document");

                } catch (e) {
                    console.warn("  - iframe download failed:", e);

            }, 500);
            
            return true;
        } catch (e) {
            console.error("  ❌ iframe method error:", e);
            return false;
        }

    function method9_FileSystemAccess() {
        console.log("  Attempting File System Access API...");
        
        // Check for File System Access API
        if (!window.showDirectoryPicker && !window.showSaveFilePicker) {
            console.warn("  ❌ File System Access API not supported");
            console.log("  - window.showSaveFilePicker exists: ${!!window.showSaveFilePicker}");
            console.log("  - window.showDirectoryPicker exists: ${!!window.showDirectoryPicker}");
            return false;
        }
        
        console.log("  ✅ File System Access API available");
        
        try {
            // Use showSaveFilePicker if available
            if (window.showSaveFilePicker) {
                console.log("  - Using showSaveFilePicker...");
                
                return window.showSaveFilePicker({
                    suggestedName: 'video-with-text.webm',
                    types: [{
                        description: 'WebM Video',
                        accept: { 'video/webm': ['.webm'] }
                    }]
                })
                .then(fileHandle => {
                    console.log("  - File picker returned handle");
                    return fileHandle.createWritable();
                })
                .then(writable => {
                    console.log("  - Writable stream created");
                    return writable.write(outputBlob);
                })
                .then(() => {
                    console.log("  - File written successfully");
                    console.log("  ✅ File System Access API succeeded");
                    return true;
                })
                .catch(err => {
                    console.warn("  ❌ File System Access API failed:", err);
                    if (err.name === 'AbortError') {
                        console.log("  - User cancelled file picker");
                    }
                    return false;
                });
            }
            
            // Fallback: try with directory picker
            if (window.showDirectoryPicker) {
                console.log("  - Using showDirectoryPicker...");
                return window.showDirectoryPicker()
                    .then(dirHandle => {
                        console.log("  - Directory picker returned");
                        const fileHandle = dirHandle.getFileHandle('video-with-text.webm', { create: true });
                        return fileHandle;
                    })
                    .then(fileHandle => {
                        console.log("  - File handle created");
                        return fileHandle.createWritable();
                    })
                    .then(writable => {
                        console.log("  - Writable stream created");
                        return writable.write(outputBlob);
                    })
                    .then(() => {
                        console.log("  - File written successfully");
                        console.log("  ✅ File System Access API succeeded");
                        return true;
                    })
                    .catch(err => {
                        console.warn("  ❌ File System Access API failed:", err);
                        return false;
                    });
            }
            
            console.warn("  ❌ No File System Access method available");
            return false;
        } catch (e) {
            console.error("  ❌ File System Access error:", e);
            return false;
        }
    }

        try {

            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                console.log("  - Fallback cleanup complete");
            }, 500);
        } catch (e) {
            console.error("Final fallback failed:", e);
        }
    }
    
    // Start the process
    console.log("Starting method chain...");
    tryNextMethod();
}
