    <script>
        // ============================================================
        // پس‌زمینه ستاره‌ای
        // ============================================================
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let shootingStars = [];
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.reset();
                this.y = Math.random() * H;
            }
            reset() {
                this.x = Math.random() * W;
                this.y = -5;
                this.size = Math.random() * 2 + 0.5;
                this.speed = Math.random() * 0.3 + 0.1;
                this.opacity = Math.random() * 0.6 + 0.4;
                this.twinkleSpeed = Math.random() * 0.02 + 0.005;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }
            update() {
                this.y += this.speed;
                if (this.y > H + 5) {
                    this.reset();
                    this.y = -5;
                }
                this.twinkleOffset += this.twinkleSpeed;
            }
            draw() {
                const alpha = this.opacity * (0.7 + 0.3 * Math.sin(this.twinkleOffset));
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
                if (this.size > 1.5) {
                    ctx.shadowColor = `rgba(255, 255, 255, ${alpha * 0.3})`;
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        class ShootingStar {
            constructor() {
                this.reset();
                this.active = false;
                this.life = 0;
                this.maxLife = 0;
            }
            reset() {
                this.x = Math.random() * W * 0.6;
                this.y = Math.random() * H * 0.3;
                this.length = Math.random() * 80 + 40;
                this.speed = Math.random() * 6 + 4;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5;
                this.opacity = 0;
                this.maxLife = Math.random() * 60 + 40;
                this.life = 0;
                this.active = true;
            }
            update() {
                if (!this.active) {
                    if (Math.random() < 0.002) {
                        this.reset();
                    }
                    return;
                }
                this.life++;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                if (this.life < 20) {
                    this.opacity = this.life / 20;
                } else if (this.life > this.maxLife - 20) {
                    this.opacity = (this.maxLife - this.life) / 20;
                } else {
                    this.opacity = 1;
                }
                if (this.life > this.maxLife || this.x > W || this.y > H) {
                    this.active = false;
                }
            }
            draw() {
                if (!this.active || this.opacity < 0.01) return;
                const endX = this.x - Math.cos(this.angle) * this.length;
                const endY = this.y - Math.sin(this.angle) * this.length;
                const grad = ctx.createLinearGradient(this.x, this.y, endX, endY);
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                grad.addColorStop(0.3, `rgba(200, 220, 255, ${this.opacity * 0.6})`);
                grad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2;
                ctx.shadowColor = `rgba(150, 200, 255, ${this.opacity * 0.3})`;
                ctx.shadowBlur = 20;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.shadowColor = `rgba(200, 220, 255, ${this.opacity * 0.5})`;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < 150; i++) {
            const star = new Star();
            star.y = Math.random() * H;
            stars.push(star);
        }

        for (let i = 0; i < 5; i++) {
            const ss = new ShootingStar();
            ss.active = false;
            shootingStars.push(ss);
        }

        function animateStars() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, W, H);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            shootingStars.forEach(ss => {
                ss.update();
                ss.draw();
            });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // ============================================================

        function addText() {

        // ============================================================
        // تابع پردازش اصلی - با رفع مشکل تشخیص ویدیو
        // ============================================================
        async function startProcessing() {
            if (processing) return;
            
            const file = document.getElementById('videoInput').files[0];
            if (!file) {
                alert('لطفاً یک ویدیو انتخاب کنید');
                return;
            }

            // دریافت متن‌ها
            updateTextData();
            const texts = textData.filter(t => t.text.trim() !== '');

            processing = true;
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('progress').style.display = 'block';
            document.getElementById('output').style.display = 'none';
            document.getElementById('percent').textContent = '0%';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('downloadBtn').disabled = true;

            // شروع انیمیشن پیام‌ها
            let msgIndex = 0;
            document.getElementById('loaderText').textContent = loadingMessages[0];
            if (messageInterval) clearInterval(messageInterval);
            messageInterval = setInterval(() => {
                msgIndex = (msgIndex + 1) % loadingMessages.length;
                document.getElementById('loaderText').textContent = loadingMessages[msgIndex];
            }, 1200);

            let video = null;
            let canvas = null;
            let stream = null;
            let recorder = null;
            let animationId = null;
            let safetyTimeout = null;
            let stopRequested = false;
            let chunks = [];
            let stopped = false;
            let startTime = 0;

            const safeStopRecorder = () => {
                if (stopped) return;
                stopped = true;
                
                if (animationId) {
                    try { cancelAnimationFrame(animationId); } catch(e) {}
                    animationId = null;
                }
                
                if (safetyTimeout) {
                    try { clearTimeout(safetyTimeout); } catch(e) {}
                    safetyTimeout = null;
                }
                
                if (messageInterval) {
                    clearInterval(messageInterval);
                    messageInterval = null;
                }
                
                if (recorder && recorder.state === 'recording') {
                    try {
                        console.log('Stopping recorder...');
                        recorder.stop();
                    } catch(e) {
                        console.warn('Recorder stop error:', e);
                    }
                }
                
                if (stream) {
                    try { stream.getTracks().forEach(t => t.stop()); } catch(e) {}
                }
                
                if (video && video.parentNode) {
                    try { document.body.removeChild(video); } catch(e) {}
                }
            };

            try {
                console.log('شروع پردازش...');
                
                video = document.createElement('video');
                video.muted = true;
                video.playsInline = true;
                video.preload = 'auto';
                video.style.display = 'none';
                document.body.appendChild(video);

                const videoUrl = URL.createObjectURL(file);
                video.src = videoUrl;
                
                // بارگذاری ویدیو با مدیریت خطا
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => {
                        reject(new Error('زمان بارگذاری ویدیو به پایان رسید'));
                    }, 30000);
                    
                    video.onloadedmetadata = () => {
                        clearTimeout(timeout);
                        console.log('Video loaded:', video.videoWidth, 'x', video.videoHeight);
                        console.log('Video duration:', video.duration);
                        resolve();
                    };
                    
                    video.onerror = (e) => {
                        clearTimeout(timeout);
                        console.error('Video onerror:', e);
                        reject(new Error('خطا در بارگذاری ویدیو'));
                    };
                    
                    // اگر ویدیو از قبل بارگذاری شده بود
                    if (video.readyState >= 1) {
                        clearTimeout(timeout);
                        resolve();
                    }
                });

                // بررسی ابعاد ویدیو
                if (!video.videoWidth || !video.videoHeight || video.videoWidth <= 0 || video.videoHeight <= 0) {
                    throw new Error('ابعاد ویدیو نامعتبر است');
                }

                // بررسی مدت زمان ویدیو
                let duration = video.duration;
                if (!duration || duration <= 0 || !isFinite(duration)) {
                    // تلاش برای دریافت duration از متادیتا
                    console.warn('Duration نامعتبر، تلاش برای دریافت مجدد...');
                    await new Promise((resolve) => {
                        video.onloadedmetadata = () => {
                            duration = video.duration;
                            resolve();
                        };
                        setTimeout(resolve, 1000);
                    });
                    
                    if (!duration || duration <= 0 || !isFinite(duration)) {
                        throw new Error('مدت زمان ویدیو نامعتبر است');
                    }
                }

                recordedDuration = duration;
                console.log('Duration final:', recordedDuration);

                // اطمینان از اینکه ویدیو در موقعیت 0 قرار دارد
                video.currentTime = 0;
                await new Promise((resolve) => {
                    video.onseeked = () => resolve();
                    setTimeout(resolve, 1000);
                });

                // Setup canvas
                canvas = document.createElement('canvas');
                let canvasWidth = wideMode ? Math.round(video.videoWidth * 1.5) : video.videoWidth;
                let canvasHeight = video.videoHeight;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                const ctx = canvas.getContext('2d');

                // Setup stream and recorder
                stream = canvas.captureStream(30);
                recorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp8',
                    videoBitsPerSecond: 2500000
                });
                chunks = [];

                recorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) {
                        chunks.push(e.data);
                        console.log('Chunk received:', e.data.size);
                    }
                };

                recorder.onstop = async () => {
                    if (stopRequested) return;
                    stopRequested = true;
                    
                    console.log('Recorder stopped, chunks:', chunks.length);
                    
                    if (chunks.length > 0) {
                        try {
                            const rawBlob = new Blob(chunks, { type: 'video/webm' });
                            console.log('Raw blob size:', rawBlob.size);
                            
                            let finalBlob = rawBlob;
                            const durationMs = recordedDuration * 1000;
                            
                            if (typeof window.ysFixWebmDuration === 'function') {
                                try {
                                    console.log('Fixing WebM duration with library...');
                                    finalBlob = await window.ysFixWebmDuration(rawBlob, durationMs, { logger: false });
                                    console.log('Duration fixed successfully');
                                } catch (fixError) {
                                    console.warn('Library fix failed, using raw blob:', fixError);
                                    finalBlob = rawBlob;
                                }
                            } else {
                                console.warn('ysFixWebmDuration not available, using raw blob');
                                try {
                                    finalBlob = await fixWebmDurationManually(rawBlob, durationMs);
                                } catch (e) {
                                    console.warn('Manual fix failed:', e);
                                    finalBlob = rawBlob;
                                }
                            }
                            
                            outputBlob = finalBlob;
                            
                            const url = URL.createObjectURL(finalBlob);
                            document.getElementById('outputVideo').src = url;
                            document.getElementById('output').style.display = 'block';
                            document.getElementById('progress').style.display = 'none';
                            document.getElementById('generateBtn').disabled = false;
                            document.getElementById('downloadBtn').disabled = false;
                            console.log('✅ Recording finished, size:', (finalBlob.size / 1024 / 1024).toFixed(2), 'MB');
                            
                            const testVideo = document.createElement('video');
                            testVideo.src = url;
                            testVideo.onloadedmetadata = () => {
                                console.log('✅ Final video duration:', testVideo.duration, 'seconds');
                            };
                            
                        } catch(e) {
                            console.error('Error creating blob:', e);
                            alert('خطا در ساخت فایل خروجی: ' + e.message);
                            document.getElementById('generateBtn').disabled = false;
                            document.getElementById('progress').style.display = 'none';
                            document.getElementById('downloadBtn').disabled = false;
                        }
                    } else {
                        alert('خطا: ویدیو خروجی خالی است');
                        document.getElementById('generateBtn').disabled = false;
                        document.getElementById('progress').style.display = 'none';
                        document.getElementById('downloadBtn').disabled = false;
                    }
                    
                    if (messageInterval) {
                        clearInterval(messageInterval);
                        messageInterval = null;
                    }
                    safeStopRecorder();
                    processing = false;
                };

                recorder.start(100);
                recordingStartTime = Date.now();

                try {
                    await video.play();
                    console.log('Video playing');
                } catch (e) {
                    video.muted = true;
                    await video.play();
                    console.log('Video playing (muted)');
                }

                const durationFinal = video.duration;
                console.log('Processing duration:', durationFinal, 'seconds');

                const fontFamily = 'Vazirmatn';
                let elapsedTime = 0;
                let frameCount = 0;
                startTime = performance.now();

                // تابع رسم متن‌ها
                function drawTexts(ctx, canvas, texts) {
                    if (!texts || texts.length === 0) return;
                    
                    const canvasCenterX = canvas.width / 2;
                    const canvasCenterY = canvas.height / 2;
                    const padding = 20;
                    
                    texts.forEach((item) => {
                        const text = item.text;
                        const position = item.position || 'center';
                        if (!text || text.trim() === '') return;
                        
                        const lines = text.split('\n').filter(line => line.trim() !== '');
                        if (lines.length === 0) return;
                        
                        let baseSize = Math.min(canvas.width, canvas.height) / 8;
                        const aspectRatio = canvas.width / canvas.height;
                        if (aspectRatio > 1.8) {
                            baseSize = canvas.height / (4.2 + (lines.length - 1) * 0.8);
                        } else if (aspectRatio < 1.1) {
                            baseSize = canvas.width / (5.5 + (lines.length - 1) * 0.6);
                        } else {
                            baseSize = Math.min(canvas.width, canvas.height) / (6.5 + (lines.length - 1) * 0.5);
                        }
                        
                        let fontSize = Math.max(16, baseSize);
                        ctx.font = `bold ${fontSize}px ${fontFamily}`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        
                        let maxLineWidth = 0;
                        lines.forEach(line => {
                            const metrics = ctx.measureText(line);
                            if (metrics.width > maxLineWidth) maxLineWidth = metrics.width;
                        });
                        
                        let maxWidth = canvas.width * 0.92;
                        let minFontSize = 12;
                        
                        while (maxLineWidth > maxWidth && fontSize > minFontSize) {
                            fontSize -= 1.5;
                            ctx.font = `bold ${fontSize}px ${fontFamily}`;
                            maxLineWidth = 0;
                            lines.forEach(line => {
                                const metrics = ctx.measureText(line);
                                if (metrics.width > maxLineWidth) maxLineWidth = metrics.width;
                            });
                        }
                        
                        if (maxLineWidth > maxWidth) {
                            fontSize = fontSize * (maxWidth / maxLineWidth) * 0.95;
                            ctx.font = `bold ${fontSize}px ${fontFamily}`;
                        }

                        const lineHeight = fontSize * 1.4;
                        const totalHeight = lines.length * lineHeight;
                        
                        let startY;
                        const paddingOffset = fontSize * 0.5 + padding;
                        
                        if (position === 'top') {
                            startY = paddingOffset + fontSize/2;
                        } else if (position === 'bottom') {
                            startY = canvas.height - paddingOffset;
                        } else {
                            startY = canvasCenterY + fontSize/3;
                        }
                        
                        if (position === 'center') {
                            startY = startY - totalHeight/2 + lineHeight/2;
                        } else if (position === 'top') {
                            startY = startY - totalHeight/2 + lineHeight/2;
                        } else {
                            startY = startY - totalHeight + lineHeight;
                        }

                        lines.forEach((line, idx) => {
                            const y = startY + idx * lineHeight;
                            
                            ctx.strokeStyle = 'black';
                            ctx.lineWidth = Math.max(6, fontSize / 5);
                            ctx.strokeText(line, canvasCenterX, y);
                            
                            ctx.lineWidth = Math.max(3, fontSize / 8);
                            ctx.strokeText(line, canvasCenterX, y);
                            
                            ctx.fillStyle = 'white';
                            ctx.fillText(line, canvasCenterX, y);
                        });
                    });
                }

                const drawFrame = () => {
                    if (stopRequested || stopped) return;

                    try {
                        const currentTime = performance.now();
                        elapsedTime = (currentTime - startTime) / 1000;

                        const currentTimeVideo = video.currentTime || 0;
                        const isEnded = video.ended || (currentTimeVideo >= durationFinal - 0.05);
                        
                        if (isEnded) {
                            console.log('Video ended at:', currentTimeVideo);
                            if (recorder && recorder.state === 'recording') {
                                safeStopRecorder();
                            }
                            return;
                        }

                        if (elapsedTime >= durationFinal + 1) {
                            console.log('Elapsed time exceeded duration');
                            if (recorder && recorder.state === 'recording') {
                                safeStopRecorder();
                            }
                            return;
                        }

                        // Draw video frame
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        const percent = Math.min(Math.round((elapsedTime / durationFinal) * 100), 100);
                        document.getElementById('percent').textContent = percent + '%';
                        document.getElementById('progressBar').style.width = percent + '%';

                        // Draw all texts
                        drawTexts(ctx, canvas, texts);

                        // واترمارک @pixel_gifbot
                        ctx.save();
                        const wmText = '@pixel_gifbot';
                        let wmSize = Math.max(14, Math.min(canvas.width, canvas.height) / 32);
                        
                        ctx.font = `bold ${wmSize}px 'Ubuntu', sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        const leftMargin = canvas.width * 0.015;
                        const centerY = canvas.height / 2;
                        
                        ctx.translate(leftMargin + wmSize * 0.35, centerY);
                        ctx.rotate(-Math.PI / 2);
                        
                        ctx.globalAlpha = 0.5;
                        ctx.strokeStyle = '#000000';
                        ctx.lineWidth = Math.max(4, wmSize / 4);
                        ctx.strokeText(wmText, 0, 0);
                        ctx.fillStyle = '#ffffff';
                        ctx.fillText(wmText, 0, 0);
                        
                        ctx.restore();

                        frameCount++;
                        animationId = requestAnimationFrame(drawFrame);

                    } catch (err) {
                        console.error('DrawFrame error:', err);
                        if (!stopRequested && !stopped) {
                            safeStopRecorder();
                        }
                    }
                };

                safetyTimeout = setTimeout(() => {
                    if (!stopRequested && !stopped) {
                        console.log('Safety timeout triggered');
                        safeStopRecorder();
                    }
                }, (durationFinal * 1000) + 15000);

                animationId = requestAnimationFrame(drawFrame);

            } catch (error) {
                console.error('Processing error:', error);
                const errorMsg = error.message || 'خطای ناشناخته';
                
                let userMessage = errorMsg;
                if (errorMsg.includes('بارگذاری') || errorMsg.includes('load')) {
                    userMessage = 'ویدیو قابل بارگذاری نیست. لطفاً از فرمت MP4 یا WebM استفاده کنید.';
                } else if (errorMsg.includes('Timeout') || errorMsg.includes('زمان')) {
                    userMessage = 'زمان بارگذاری ویدیو به پایان رسید. لطفاً فایل کوچک‌تری انتخاب کنید.';
                } else if (errorMsg.includes('duration') || errorMsg.includes('مدت')) {
                    userMessage = 'مدت زمان ویدیو نامعتبر است. لطفاً از یک ویدیوی معتبر استفاده کنید.';
                } else if (errorMsg.includes('dimensions') || errorMsg.includes('ابعاد')) {
                    userMessage = 'ابعاد ویدیو نامعتبر است. لطفاً از یک ویدیوی معتبر استفاده کنید.';
                }
                
                alert('خطا در پردازش ویدیو: ' + userMessage);
                if (messageInterval) {
                    clearInterval(messageInterval);
                    messageInterval = null;
                }
                safeStopRecorder();
                processing = false;
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('progress').style.display = 'none';
                document.getElementById('downloadBtn').disabled = false;
            }
        }

        function fixWebmDurationManually(blob, durationMs) {
            return new Promise((resolve) => {
                try {
                    const reader = new FileReader();
                    reader.onload = function() {
                        try {
                            const buffer = reader.result;
                            const view = new DataView(buffer);
                            
                            const durationMarker = 0x4489;
                            let durationOffset = -1;
                            let durationLength = 0;
                            
                            const clusterMarker = 0x1F43B675;
                            let clusterOffset = -1;
                            
                            for (let i = 0; i < buffer.byteLength - 4; i++) {
                                if (view.getUint16(i) === durationMarker) {
                                    durationOffset = i;
                                    durationLength = view.getUint8(i + 2);
                                    break;
                                }
                            }
                            
                            for (let i = 0; i < buffer.byteLength - 4; i++) {
                                if (view.getUint32(i) === clusterMarker) {
                                    clusterOffset = i;
                                    break;
                                }
                            }
                            
                            const durationValue = durationMs / 1000;
                            const floatBuffer = new ArrayBuffer(8);
                            new DataView(floatBuffer).setFloat64(0, durationValue);
                            const floatBytes = new Uint8Array(floatBuffer);
                            
                            let resultBuffer;
                            
                            if (durationOffset !== -1) {
                                resultBuffer = new Uint8Array(buffer);
                                for (let i = 0; i < 8 && i < durationLength; i++) {
                                    resultBuffer[durationOffset + 3 + i] = floatBytes[i];
                                }
                            } else if (clusterOffset > 0) {
                                const newSize = buffer.byteLength + 12;
                                resultBuffer = new Uint8Array(newSize);
                                resultBuffer.set(new Uint8Array(buffer), 0);
                                
                                const pos = clusterOffset;
                                resultBuffer[pos - 2] = 0x44;
                                resultBuffer[pos - 1] = 0x89;
                                resultBuffer[pos] = 8;
                                for (let i = 0; i < 8; i++) {
                                    resultBuffer[pos + 1 + i] = floatBytes[i];
                                }
                            } else {
                                resolve(blob);
                                return;
                            }
                            
                            resolve(new Blob([resultBuffer], { type: 'video/webm' }));
                        } catch (e) {
                            console.warn('Manual fix failed:', e);
                            resolve(blob);
                        }
                    };
                    reader.readAsArrayBuffer(blob);
                } catch (e) {
                    console.warn('Manual fix failed:', e);
                    resolve(blob);
                }
            });
        }

        function downloadOutput() {
            if (!outputBlob) {
                alert('ویدیویی برای دانلود وجود ندارد');
                return;
            }
            
            try {
                const a = document.createElement('a');
                const url = URL.createObjectURL(outputBlob);
                a.href = url;
                a.download = 'video-with-text.webm';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                }, 1000);
                console.log('✅ Download started successfully');
            } catch (e) {
                console.error('Download error:', e);
                alert('خطا در دانلود: ' + e.message);
            }
        }
